<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2649a7" />
    <link rel="icon" type="image/svg+xml" href="/images/wp-logomark.svg" />

    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    />

    <link rel="alternate" hreflang="en" href="https://wpec.expert/" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Default OpenGraph (per-page meta overrides this) -->
    <meta property="og:site_name" content="Wolstein Putts Expert Consulting" />
    <meta property="og:type" content="website" />
    <meta
      property="og:image"
      content="https://wpec.expert/images/wp-logo-horizontal.svg"
    />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Robots directives -->
    <meta
      name="robots"
      content="index,follow,max-snippet:-1,max-image-preview:large,max-video-preview:-1"
    />

    <title>
      Wolstein Putts Expert Consulting | Vocational Experts for Employment Law
      &amp; Matrimonial Matters
    </title>
    <meta
      name="description"
      content="Wolstein Putts Expert Consulting is a full-service vocational expert firm with a focus on employment law and matrimonial matters."
    />

    <!-- Static Organization + WebSite JSON-LD so crawlers that don't execute
         JS still get structured data. React re-emits per-page graphs (keyed by
         @id) after hydration. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "ProfessionalService",
            "@id": "https://wpec.expert/#org",
            "name": "Wolstein Putts Expert Consulting",
            "alternateName": "WPEC",
            "url": "https://wpec.expert",
            "telephone": "+1-917-979-2040",
            "email": "contact@wpec.expert",
            "logo": "https://wpec.expert/images/wp-logo-horizontal.svg",
            "image": "https://wpec.expert/images/wp-logo-horizontal.svg",
            "areaServed": { "@type": "Country", "name": "United States" },
            "address": {
              "@type": "PostalAddress",
              "addressLocality": "New York",
              "addressRegion": "NY",
              "addressCountry": "US"
            },
            "sameAs": [
              "https://www.linkedin.com/company/wolstein-putts/",
              "https://kwvrs.com"
            ],
            "parentOrganization": {
              "@type": "Organization",
              "name": "Kincaid Wolstein Vocational and Rehabilitation Services",
              "url": "https://kwvrs.com"
            }
          },
          {
            "@type": "WebSite",
            "@id": "https://wpec.expert/#website",
            "url": "https://wpec.expert",
            "name": "Wolstein Putts Expert Consulting",
            "publisher": { "@id": "https://wpec.expert/#org" }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
